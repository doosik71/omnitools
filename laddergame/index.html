<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사다리타기 게임</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🪜 사다리타기 게임 🪜</h1>

      <!-- 설정 섹션 -->
      <div class="settings-section">
        <div class="setting-group">
          <label for="ladderCount">사다리 수:</label>
          <input
            type="number"
            id="ladderCount"
            min="3"
            max="20"
            value="5"
            class="number-input"
          />
          <span id="countDisplay">4개</span>
        </div>

        <div class="setting-group">
          <label for="complexity">복잡도:</label>
          <input type="range" id="complexity" min="3" max="15" value="6" />
          <span id="complexityDisplay">5</span>
        </div>

        <button id="generateBtn" class="btn btn-primary">사다리 그리기</button>
      </div>

      <!-- 상단 입력 섹션 -->
      <div class="input-section">
        <h3>출발점</h3>
        <div id="topInputs" class="inputs-container"></div>
      </div>

      <!-- 캔버스 섹션 -->
      <div class="canvas-section">
        <canvas id="ladderCanvas" width="900" height="400"></canvas>
      </div>

      <!-- 하단 입력 섹션 -->
      <div class="input-section">
        <h3>도착점</h3>
        <div id="bottomInputs" class="inputs-container"></div>
      </div>

      <!-- 결과 섹션 -->
      <div id="results" class="results-section" style="display: none">
        <h3>매칭 결과</h3>
        <div id="resultsList" class="results-list"></div>
      </div>

      <!-- 현재 URL 섹션 -->
      <div class="url-section">
        <label for="shareUrl">공유 URL:</label>
        <input type="text" id="shareUrl" readonly class="url-input" />
        <button id="copyBtn" class="btn btn-small">복사</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
